name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/agynio/agyn-cli

jobs:
  binary:
    name: Build and release binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/agyn-linux-amd64 ./cmd/agyn
          GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/agyn-linux-arm64 ./cmd/agyn

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/agyn-linux-amd64
            dist/agyn-linux-arm64

  image:
    name: Build and push container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agyn-cli
          cache-to: type=gha,scope=agyn-cli,mode=max

      - name: Verify multi-arch manifest
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          INSPECT="$(docker buildx imagetools inspect "$IMAGE_NAME:$TAG" --raw)"
          FOUND="$(echo "$INSPECT" | jq -r '[.manifests[].platform.architecture] | sort | join(",")')"
          MISSING=()
          for ARCH in amd64 arm64; do
            if ! echo "$FOUND" | grep -q "$ARCH"; then
              MISSING+=("linux/$ARCH")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing architectures in $IMAGE_NAME:$TAG: ${MISSING[*]}"
            exit 1
          fi
          echo "Manifest $IMAGE_NAME:$TAG includes linux/amd64 and linux/arm64"
